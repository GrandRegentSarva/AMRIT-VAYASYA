services:
  api:
    build: .
    env_file: .env
    ports: ["8000:8000"]
    volumes:
      - ./data:/data
    depends_on: [qdrant, redis]
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
  worker:
    build: .
    env_file: .env
    volumes:
      - ./data:/data
    depends_on: [qdrant, redis]
    command: celery -A apps.worker.celery_app worker --loglevel=INFO
  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - qdrant_data:/qdrant/storage
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
volumes:
  qdrant_data:

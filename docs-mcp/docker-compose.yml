services:
  api:
    build: .
    env_file: .env
    ports: ["8000:8000"]
    volumes:
      - ./data:/data
    depends_on: [qdrant, redis]
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
  worker:
    build: .
    env_file: .env
    volumes:
      - ./data:/data
    depends_on: [qdrant, redis]
    command: celery -A apps.worker.celery_app worker --loglevel=INFO
  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - qdrant_data:/qdrant/storage
  redis:
    image: redis:7-alpine
    ports: ["6381:6379"]
  neo4j:
    image: neo4j:5.18-community
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/vayasya_dev
    volumes:
      - neo4j_data:/data
volumes:
  qdrant_data:
  neo4j_data:
